<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Puzzle Pro</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#121212;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.header{
    padding:10px;
    text-align:center;
}

#game-outer{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    width:95vw;
}

#game{
    position:relative;
    background:#333;
    border:3px solid white;
}

.tile{
    position:absolute;
    background-repeat:no-repeat;
    touch-action:none;
    will-change: transform;
}

.controls{
    display:flex;
    gap:8px;
    width:95%;
    padding-bottom:20px;
}

button,label{
    flex:1;
    padding:12px;
    background:#2196F3;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:8px;
    text-align:center;
}

.file{ background:#e91e63; }
.next{ background:#ff9800; }

input{ display:none; }

.diff{
    display:flex;
    gap:6px;
    justify-content:center;
    margin-bottom:5px;
}

.diff button{
    padding:6px 12px;
    border-radius:12px;
    border:1px solid #666;
    background:#333;
    color:white;
}
.diff .active{
    border-color:#ffeb3b;
    color:#ffeb3b;
}
</style>
</head>

<body>

<div class="header">
    <h2>Puzzle Pro</h2>

    <div class="diff">
        <button onclick="setSize(3,this)">初級</button>
        <button class="active" onclick="setSize(4,this)">中級</button>
        <button onclick="setSize(5,this)">上級</button>
        <button onclick="setSize(8,this)">超上級</button>
    </div>
</div>

<div id="game-outer">
    <div id="game"></div>
</div>

<div class="controls">
    <label class="file">
        <input type="file" onchange="loadFile(this)">
        写真
    </label>

    <button onclick="shuffle()">シャッフル</button>
    <button class="next" onclick="nextImage()">次の画像</button>
</div>

<script>

/* =====================
   API
===================== */
const KEY = "55756665-23bacf1941f5fd32e51bbc3c3";

/* =====================
   状態
===================== */
let size = 4;
let img = new Image();
let tiles = [];
let drag = null;
let tiger = false;

const game = document.getElementById("game");

/* =====================
   縦長フィルタ付き取得
===================== */
async function fetchImage(type){

    const q = type==="bird"
        ? "shoebill bird"
        : "tiger animal";

    const res = await fetch(
        `https://pixabay.com/api/?key=${KEY}&q=${encodeURIComponent(q)}&image_type=photo&per_page=100&safesearch=true`
    );

    const data = await res.json();

    // ★縦長だけ抽出
    const vertical = data.hits.filter(h => {
        return h.imageWidth < h.imageHeight * 0.9;
    });

    const pool = vertical.length ? vertical : data.hits;

    const pick = pool[Math.floor(Math.random()*pool.length)];

    img.src = pick.webformatURL;
}

/* =====================
   次画像（交互）
===================== */
function nextImage(){
    tiger = !tiger;
    fetchImage(tiger ? "tiger" : "bird");
}

/* =====================
   ロード
===================== */
img.onload = ()=>{
    setup();
    shuffle();
};

/* =====================
   サイズ調整
===================== */
function setup(){

    const w = document.getElementById("game-outer").clientWidth;

    game.style.width = w+"px";
    game.style.height = w+"px"; // 正方形

    game.innerHTML="";
    tiles=[];

    for(let i=0;i<size*size;i++){

        const t=document.createElement("div");
        t.className="tile";

        const x=i%size;
        const y=Math.floor(i/size);

        const tileW = w/size;

        t.style.width=tileW+"px";
        t.style.height=tileW+"px";

        t.dataset.x=x;
        t.dataset.y=y;
        t.dataset.cx=x;
        t.dataset.cy=y;

        t.style.backgroundImage=`url(${img.src})`;
        t.style.backgroundSize=`${size*100}%`;
        t.style.backgroundPosition=
            `${(x/(size-1))*100}% ${(y/(size-1))*100}%`;

        t.addEventListener("touchstart",start,{passive:false});
        t.addEventListener("touchmove",move,{passive:false});
        t.addEventListener("touchend",end);

        game.appendChild(t);
        tiles.push(t);
    }

    render();
}

/* =====================
   GPU描画（軽量）
===================== */
function render(){
    tiles.forEach(t=>{
        t.style.transform =
            `translate(${t.dataset.x*100}%,${t.dataset.y*100}%)`;
    });
}

/* =====================
   操作（軽量版）
===================== */
function start(e){
    drag = e.target;
    drag.style.zIndex=10;
}

function move(e){
    if(!drag)return;

    const touch = e.touches[0];
    const r = game.getBoundingClientRect();

    drag.style.transform =
        `translate(${touch.clientX-r.left}px,${touch.clientY-r.top}px)`;
}

function end(e){

    if(!drag)return;

    const touch = e.changedTouches[0];
    const r = game.getBoundingClientRect();

    const x = Math.floor((touch.clientX-r.left)/(r.width/size));
    const y = Math.floor((touch.clientY-r.top)/(r.height/size));

    const target = tiles.find(t=>
        t.dataset.x==x &&
        t.dataset.y==y &&
        t!==drag
    );

    if(target){

        let tx=drag.dataset.x;
        let ty=drag.dataset.y;

        drag.dataset.x=target.dataset.x;
        drag.dataset.y=target.dataset.y;

        target.dataset.x=tx;
        target.dataset.y=ty;
    }

    render();

    drag.style.zIndex=1;
    drag=null;

    check();
}

/* =====================
   クリア
===================== */
function check(){

    const ok = tiles.every(t=>
        t.dataset.x==t.dataset.cx &&
        t.dataset.y==t.dataset.cy
    );

    if(ok){
        setTimeout(nextImage,800);
    }
}

/* =====================
   シャッフル
===================== */
function shuffle(){

    for(let i=0;i<size*size*3;i++){

        const a=tiles[Math.floor(Math.random()*tiles.length)];
        const b=tiles[Math.floor(Math.random()*tiles.length)];

        let tx=a.dataset.x;
        let ty=a.dataset.y;

        a.dataset.x=b.dataset.x;
        a.dataset.y=b.dataset.y;

        b.dataset.x=tx;
        b.dataset.y=ty;
    }

    render();
}

/* =====================
   難易度
===================== */
function setSize(s,btn){

    size=s;

    document.querySelectorAll(".diff button")
        .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    setup();
    shuffle();
}

/* =====================
   手動画像
===================== */
function loadFile(i){
    const r=new FileReader();
    r.onload=e=>img.src=e.target.result;
    r.readAsDataURL(i.files[0]);
}

/* =====================
   start
===================== */
fetchImage("bird");

</script>

</body>
</html>
