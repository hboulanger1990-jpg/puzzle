<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鳥パズル・フリック版</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #121212; color: white; height: 100vh; overflow: hidden;
            touch-action: none; /* ブラウザ全体のスクロールを禁止 */
        }
        h1 { font-size: 1.5rem; margin: 15px 0; color: #ffeb3b; }
        #game-container { 
            position: relative; width: 90vw; height: 90vw; 
            max-width: 400px; max-height: 400px; 
            border: 4px solid #fff; border-radius: 10px; background: #333; 
        }
        .tile {
            position: absolute; width: 25%; height: 25%; 
            background-image: url('https://loremflickr.com/500/500/bird');
            background-size: 400% 400%; border: 1px solid rgba(255,255,255,0.2); 
            box-sizing: border-box; transition: all 0.2s ease-out;
        }
        .controls { margin-top: 30px; }
        button { 
            padding: 15px 40px; font-size: 18px; cursor: pointer; 
            background: #4caf50; color: white; border: none; border-radius: 50px; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>Bird Puzzle</h1>
    <div id="game-container" id="touch-area"></div>
    <div class="controls">
        <button onclick="shuffleBoard()">シャッフル</button>
    </div>

    <script>
        const size = 4;
        const container = document.getElementById('game-container');
        let tiles = [];
        let emptyPos = { x: 3, y: 3 };
        let touchStart = { x: 0, y: 0 };

        function initBoard() {
            container.innerHTML = '';
            tiles = [];
            for (let i = 0; i < size * size - 1; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const x = i % size; const y = Math.floor(i / size);
                tile.style.left = (x * 25) + '%';
                tile.style.top = (y * 25) + '%';
                tile.style.backgroundPosition = `${(x / 3) * 100}% ${(y / 3) * 100}%`;
                tile.dataset.x = x; tile.dataset.y = y;
                container.appendChild(tile);
                tiles.push(tile);
            }
        }

        // タッチ開始
        container.addEventListener('touchstart', (e) => {
            touchStart.x = e.touches[0].clientX;
            touchStart.y = e.touches[0].clientY;
        }, {passive: false});

        // タッチ終了（ここでフリック方向を判定）
        container.addEventListener('touchend', (e) => {
            const touchEnd = {
                x: e.changedTouches[0].clientX,
                y: e.changedTouches[0].clientY
            };
            const dx = touchEnd.x - touchStart.x;
            const dy = touchEnd.y - touchStart.y;

            // フリックの距離が短い場合は無視（誤操作防止）
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

            let targetX = emptyPos.x;
            let targetY = emptyPos.y;

            if (Math.abs(dx) > Math.abs(dy)) {
                // 横方向のフリック
                targetX = dx > 0 ? emptyPos.x - 1 : emptyPos.x + 1;
            } else {
                // 縦方向のフリック
                targetY = dy > 0 ? emptyPos.y - 1 : emptyPos.y + 1;
            }

            const tile = tiles.find(t => parseInt(t.dataset.x) === targetX && parseInt(t.dataset.y) === targetY);
            if (tile) moveTile(tile);
        }, {passive: false});

        function moveTile(tile) {
            const tx = parseInt(tile.dataset.x);
            const ty = parseInt(tile.dataset.y);
            const tempX = emptyPos.x; const tempY = emptyPos.y;
            emptyPos.x = tx; emptyPos.y = ty;
            tile.dataset.x = tempX; tile.dataset.y = tempY;
            tile.style.left = (tempX * 25) + '%';
            tile.style.top = (tempY * 25) + '%';
        }

        function shuffleBoard() {
            for (let i = 0; i < 200; i++) {
                const neighbors = tiles.filter(t => 
                    Math.abs(parseInt(t.dataset.x) - emptyPos.x) + Math.abs(parseInt(t.dataset.y) - emptyPos.y) === 1
                );
                moveTile(neighbors[Math.floor(Math.random() * neighbors.length)]);
            }
        }
        initBoard();
    </script>
</body>
</html>
