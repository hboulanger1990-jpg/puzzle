<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鳥パズル・入れ替え版</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #121212; color: white; height: 100vh; overflow: hidden;
        }
        h1 { font-size: 1.2rem; margin: 15px 0; color: #ffeb3b; }
        
        #game-container { 
            position: relative; width: 90vw; height: 90vw; 
            max-width: 400px; max-height: 400px; 
            border: 4px solid #fff; border-radius: 10px; background: #333; 
        }
        .tile {
            position: absolute; width: 33.33%; height: 33.33%;
            background-image: url('https://loremflickr.com/600/600/bird');
            background-size: 300% 300%; border: 1px solid rgba(255,255,255,0.3); 
            box-sizing: border-box; cursor: grab; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: rgba(255,255,255,0.8); text-shadow: 1px 1px 2px black;
        }
        .tile:active { cursor: grabbing; z-index: 10; opacity: 0.8; }
        
        .controls { margin-top: 30px; }
        .shuffle-btn { 
            padding: 12px 40px; font-size: 18px; cursor: pointer; 
            background: #2196F3; color: white; border: none; border-radius: 50px; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>Drag & Swap Bird Puzzle</h1>
    <div id="game-container"></div>
    <div class="controls">
        <button class="shuffle-btn" onclick="shuffleBoard()">バラバラにする</button>
    </div>

    <script>
        const size = 3;
        const container = document.getElementById('game-container');
        let tiles = [];
        let draggedTile = null;

        function initBoard() {
            container.innerHTML = '';
            tiles = [];
            for (let i = 0; i < size * size; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.draggable = true;
                const x = i % size; const y = Math.floor(i / size);
                
                // 初期位置（正解の位置）を記憶
                tile.dataset.correctX = x;
                tile.dataset.correctY = y;
                tile.dataset.currentX = x;
                tile.dataset.currentY = y;
                
                updateTilePosition(tile);
                tile.style.backgroundPosition = `${(x / (size - 1)) * 100}% ${(y / (size - 1)) * 100}%`;
                tile.innerText = i + 1; // ガイド用の数字

                // ドラッグイベントの設定
                tile.addEventListener('touchstart', handleTouchStart, {passive: false});
                tile.addEventListener('touchmove', handleTouchMove, {passive: false});
                tile.addEventListener('touchend', handleTouchEnd, {passive: false});

                container.appendChild(tile);
                tiles.push(tile);
            }
        }

        function updateTilePosition(tile) {
            const x = tile.dataset.currentX;
            const y = tile.dataset.currentY;
            tile.style.left = (x * 33.33) + '%';
            tile.style.top = (y * 33.33) + '%';
        }

        // スマホ用タッチ操作
        function handleTouchStart(e) {
            draggedTile = e.target;
            draggedTile.style.zIndex = 1000;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const containerRect = container.getBoundingClientRect();
            // 指の位置に合わせてタイルを動かす
            draggedTile.style.left = (touch.clientX - containerRect.left - draggedTile.offsetWidth/2) + 'px';
            draggedTile.style.top = (touch.clientY - containerRect.top - draggedTile.offsetHeight/2) + 'px';
        }

        function handleTouchEnd(e) {
            const touch = e.changedTouches[0];
            const containerRect = container.getBoundingClientRect();
            
            // 指を離した位置にあるタイルを探す
            const x = Math.floor((touch.clientX - containerRect.left) / (containerRect.width / size));
            const y = Math.floor((touch.clientY - containerRect.top) / (containerRect.height / size));

            const targetTile = tiles.find(t => t.dataset.currentX == x && t.dataset.currentY == y && t !== draggedTile);

            if (targetTile) {
                // 入れ替え
                const tempX = draggedTile.dataset.currentX;
                const tempY = draggedTile.dataset.currentY;
                draggedTile.dataset.currentX = targetTile.dataset.currentX;
                draggedTile.dataset.currentY = targetTile.dataset.currentY;
                targetTile.dataset.currentX = tempX;
                targetTile.dataset.currentY = tempY;
            }

            // 位置をリセット（アニメーションで整列）
            draggedTile.style.zIndex = 1;
            tiles.forEach(updateTilePosition);
            draggedTile = null;
        }

        function shuffleBoard() {
            // ランダムに入れ替える
            for (let i = 0; i < 20; i++) {
                const t1 = tiles[Math.floor(Math.random() * tiles.length)];
                const t2 = tiles[Math.floor(Math.random() * tiles.length)];
                const tx = t1.dataset.currentX; const ty = t1.dataset.currentY;
                t1.dataset.currentX = t2.dataset.currentX; t1.dataset.currentY = t2.dataset.currentY;
                t2.dataset.currentX = tx; t2.dataset.currentY = ty;
            }
            tiles.forEach(updateTilePosition);
        }

        initBoard();
    </script>
</body>
</html>
