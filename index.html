<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Poster Puzzle Pro</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #121212; color: white; height: 100vh; overflow: hidden;
        }
        .header { width: 100%; padding-top: calc(10px + env(safe-area-inset-top)); display: flex; flex-direction: column; align-items: center; z-index: 10; }
        h1 { font-size: 1.1rem; margin: 5px 0; color: #ffeb3b; }
        
        .selector-row { margin-bottom: 5px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .btn-small { padding: 4px 8px; border-radius: 12px; border: 1px solid #555; background: #333; color: white; font-size: 10px; cursor: pointer; }
        .btn-small.active { border-color: #ffeb3b; color: #ffeb3b; }

        #main-game { flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        #stats-page { display: none; flex: 1; width: 100%; flex-direction: column; align-items: center; justify-content: center; }

        #game-outer { flex: 1; width: 95vw; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        #game-container { position: relative; border: 3px solid #fff; border-radius: 5px; background: #333; overflow: hidden; }
        .tile { position: absolute; border: 0.3px solid rgba(255,255,255,0.4); box-sizing: border-box; transition: left 0.3s, top 0.3s; background-repeat: no-repeat; }
        
        .controls { width: 95%; display: flex; justify-content: center; gap: 8px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .btn { flex: 1; padding: 12px 0; border-radius: 10px; border: none; font-weight: bold; color: white; font-size: 13px; text-align: center; cursor: pointer; }
        .file-label { background: #e91e63; }
        .shuffle-btn { background: #2196F3; }
        .next-btn { background: #ff9800; }
        .stats-btn { background: #607d8b; }
        input[type="file"] { display: none; }

        #clear-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .stats-card { background: #222; padding: 20px; border-radius: 15px; border: 1px solid #ffeb3b; text-align: center; width: 80%; }
    </style>
</head>
<body>
    <div class="header">
        <h1 onclick="togglePage('game')">Poster Puzzle Pro</h1>
        <div class="selector-row">
            <button class="btn-small diff-btn" onclick="changeDifficulty(3, this)">初級</button>
            <button class="btn-small diff-btn active" onclick="changeDifficulty(4, this)">中級</button>
            <button class="btn-small diff-btn" onclick="changeDifficulty(5, this)">上級</button>
        </div>
        <div class="selector-row">
            <button class="btn-small cat-btn active" onclick="setCategory('bird', this)">鳥</button>
            <button class="btn-small cat-btn" onclick="setCategory('dog', this)">犬</button>
            <button class="btn-small cat-btn" onclick="setCategory('cat', this)">猫</button>
            <button class="btn-small cat-btn" onclick="setCategory('horse', this)">馬</button>
            <button class="btn-small cat-btn" onclick="setCategory('shoebill', this)">ハシビロコウ</button>
        </div>
    </div>

    <div id="main-game">
        <div id="game-outer"><div id="game-container"></div></div>
        <div class="controls">
            <label class="btn file-label"><input type="file" accept="image/*" multiple onchange="handleFiles(this)">フォルダ選択</label>
            <button class="btn next-btn" onclick="nextImage()">次の画像</button>
            <button class="btn stats-btn" onclick="togglePage('stats')">記録</button>
        </div>
    </div>

    <div id="stats-page">
        <div class="stats-card">
            <h2>クリア実績</h2>
            <p>今日のクリア: <span id="stat-today">0</span> 回</p>
            <p>累計クリア: <span id="stat-total">0</span> 回</p>
            <button class="btn next-btn" style="width:100%" onclick="togglePage('game')">戻る</button>
        </div>
    </div>

    <div id="clear-overlay">
        <div style="font-size: 2.5rem;">🎉</div>
        <div style="font-size: 1.5rem; font-weight: bold; color: #ffeb3b; margin: 10px 0;">おめでとう！</div>
    </div>

    <script>
        let size = 4;
        let img = new Image();
        let tiles = [];
        let isShuffled = false;
        let currentCategory = 'bird';
        let localImageList = [];
        let localImageIndex = 0;

        const container = document.getElementById('game-container');
        const overlay = document.getElementById('clear-overlay');

        // 画像読み込み完了時：サイズ調整 -> タイル作成 -> 即シャッフル
        img.onload = () => {
            adjustContainerSize();
            initBoard();
            shuffleBoard();
        };

        function nextImage() {
            isShuffled = false;
            if (localImageList.length > 0) {
                img.src = localImageList[localImageIndex];
                localImageIndex = (localImageIndex + 1) % localImageList.length;
            } else {
                img.src = `https://loremflickr.com{currentCategory}?random=${Math.random()}`;
            }
        }

        function setCategory(cat, btn) {
            currentCategory = cat;
            localImageList = []; // カテゴリ選択時はファイルリストをクリア
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            nextImage();
        }

        function handleFiles(input) {
            if (input.files.length > 0) {
                localImageList = Array.from(input.files).map(file => URL.createObjectURL(file));
                localImageIndex = 0;
                nextImage();
            }
        }

        function adjustContainerSize() {
            const outer = document.getElementById('game-outer');
            const maxWidth = outer.clientWidth;
            const maxHeight = outer.clientHeight;
            const imgRatio = img.width / img.height;
            const areaRatio = maxWidth / maxHeight;
            let finalW, finalH;
            if (imgRatio > areaRatio) { finalW = maxWidth; finalH = maxWidth / imgRatio; }
            else { finalH = maxHeight; finalW = maxHeight * imgRatio; }
            container.style.width = finalW + 'px';
            container.style.height = finalH + 'px';
        }

        function initBoard() {
            container.innerHTML = '';
            tiles = [];
            for (let i = 0; i < size * size; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const x = i % size; const y = Math.floor(i / size);
                tile.style.width = (100 / size) + '%';
                tile.style.height = (100 / size) + '%';
                tile.dataset.currentX = x; tile.dataset.currentY = y;
                tile.dataset.correctX = x; tile.dataset.correctY = y;
                updateTilePosition(tile);
                tile.style.backgroundImage = `url('${img.src}')`;
                tile.style.backgroundSize = (size * 100) + '%';
                tile.style.backgroundPosition = `${(x / (size - 1)) * 100}% ${(y / (size - 1)) * 100}%`;
                tile.addEventListener('touchstart', handleStart, {passive: false});
                tile.addEventListener('touchmove', handleMove, {passive: false});
                tile.addEventListener('touchend', handleEnd, {passive: false});
                container.appendChild(tile);
                tiles.push(tile);
            }
        }

        function updateTilePosition(tile) {
            tile.style.left = (tile.dataset.currentX * (100 / size)) + '%';
            tile.style.top = (tile.dataset.currentY * (100 / size)) + '%';
        }

        function shuffleBoard() {
            let pos = tiles.map(t => ({x: t.dataset.correctX, y: t.dataset.correctY}));
            for (let i = pos.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pos[i], pos[j]] = [pos[j], pos[i]];
            }
            tiles.forEach((t, i) => {
                t.dataset.currentX = pos[i].x; t.dataset.currentY = pos[i].y;
                updateTilePosition(t);
            });
            isShuffled = true;
        }

        let draggedTile = null;
        function handleStart(e) { draggedTile = e.target; draggedTile.style.zIndex = 1000; draggedTile.style.transition = 'none'; }
        function handleMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            draggedTile.style.left = (touch.clientX - rect.left - draggedTile.offsetWidth/2) + 'px';
            draggedTile.style.top = (touch.clientY - rect.top - draggedTile.offsetHeight/2) + 'px';
        }
        function handleEnd(e) {
            const touch = e.changedTouches[0];
            const rect = container.getBoundingClientRect();
            const x = Math.floor((touch.clientX - rect.left) / (rect.width / size));
            const y = Math.floor((touch.clientY - rect.top) / (rect.height / size));
            const targetTile = tiles.find(t => t.dataset.currentX == x && t.dataset.currentY == y && t !== draggedTile);
            draggedTile.style.transition = 'all 0.3s';
            if (targetTile && x >= 0 && x < size && y >= 0 && y < size) {
                const tx = draggedTile.dataset.currentX; const ty = draggedTile.dataset.currentY;
                draggedTile.dataset.currentX = targetTile.dataset.currentX;
                draggedTile.dataset.currentY = targetTile.dataset.currentY;
                targetTile.dataset.currentX = tx; targetTile.dataset.currentY = ty;
            }
            tiles.forEach(updateTilePosition);
            draggedTile.style.zIndex = 1;
            draggedTile = null;
            if(isShuffled) checkClear();
        }

        function checkClear() {
            if (tiles.every(t => t.dataset.currentX == t.dataset.correctX && t.dataset.currentY == t.dataset.correctY)) {
                isShuffled = false;
                saveProgress();
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.display = 'none'; nextImage(); }, 2000);
            }
        }

        function saveProgress() {
            const today = new Date().toLocaleDateString();
            let stats = JSON.parse(localStorage.getItem('puzzle_stats') || '{"total":0, "daily":{}}');
            stats.total++;
            stats.daily[today] = (stats.daily[today] || 0) + 1;
            localStorage.setItem('puzzle_stats', JSON.stringify(stats));
        }

        function togglePage(page) {
            document.getElementById('main-game').style.display = page === 'game' ? 'flex' : 'none';
            document.getElementById('stats-page').style.display = page === 'stats' ? 'flex' : 'none';
            if(page === 'stats') {
                const stats = JSON.parse(localStorage.getItem('puzzle_stats') || '{"total":0, "daily":{}}');
                const today = new Date().toLocaleDateString();
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-today').innerText = stats.daily[today] || 0;
            }
        }

        function changeDifficulty(s, btn) {
            size = s;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            nextImage();
        }

        nextImage(); // 初回起動
    </script>
</body>
</html>
