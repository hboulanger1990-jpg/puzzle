```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Puzzle Pro</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#121212;
    color:white;
    height:100vh;
    overflow:hidden;
}

.header{
    width:100%;
    padding-top:calc(10px + env(safe-area-inset-top));
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    font-size:1.2rem;
    margin:5px 0;
    color:#ffeb3b;
}

.difficulty-selector{
    margin-bottom:8px;
    display:flex;
    gap:8px;
}

.btn{
    flex:1;
    padding:12px 0;
    border-radius:10px;
    border:none;
    font-weight:bold;
    color:white;
    font-size:13px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.diff-btn{
    padding:8px 16px;
    border-radius:18px;
    border:1px solid #555;
    background:#333;
    color:white;
    font-size:14px;
}

.diff-btn.active{
    border-color:#ffeb3b;
    color:#ffeb3b;
}

#game-outer{
    flex:1;
    width:95vw;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

#game-container{
    position:relative;
    border:3px solid #fff;
    border-radius:5px;
    background:#333;
    overflow:hidden;

    /* スクロール防止 */
    touch-action:none;
}

.tile{
    position:absolute;
    border:1px solid rgba(255,255,255,0.2);
    box-sizing:border-box;
    background-repeat:no-repeat;

    /* transformで軽量化 */
    transition:transform 0.15s;
    will-change:transform;
}

.controls{
    width:95%;
    display:flex;
    justify-content:center;
    gap:8px;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
}

.file-label{ background:#e91e63; }
.shuffle-btn{ background:#2196F3; }
.next-btn{ background:#ff9800; }

input[type="file"]{
    display:none;
}

#clear-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:2rem;
    color:#ffeb3b;
}

</style>
</head>

<body>

<div class="header">

    <h1>Poster Puzzle Pro</h1>

    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(3,this)">初級</button>
        <button class="diff-btn active" onclick="changeDifficulty(4,this)">中級</button>
        <button class="diff-btn" onclick="changeDifficulty(5,this)">上級</button>
        <button class="diff-btn" onclick="changeDifficulty(7,this)">超上級</button>
    </div>

</div>

<div id="game-outer">
    <div id="game-container"></div>
</div>

<div class="controls">

    <label class="btn file-label">
        <input type="file" accept="image/*" onchange="handleFile(this)">
        写真選択
    </label>

    <button class="btn shuffle-btn" onclick="shuffleBoard()">
        シャッフル
    </button>

    <button class="btn next-btn" onclick="loadNextImage()">
        次の画像
    </button>

</div>

<div id="clear-overlay">
    CLEAR!
</div>

<script>

/* =========================
   Pixabay API
========================= */

const PIXABAY_KEY =
"55756665-23bacf1941f5fd32e51bbc3c3";

/* =========================
   状態
========================= */

let size = 4;

let img = new Image();

/* CORS対策 */
img.crossOrigin = "anonymous";

let tiles = [];

let drag = null;

let tigerMode = false;

/* =========================
   DOM
========================= */

const container =
document.getElementById("game-container");

const overlay =
document.getElementById("clear-overlay");

/* =========================
   Pixabay取得
========================= */

function loadPixabayImage(type){

    const query =
    (type === "shoebill")
    ? "shoebill bird stork"
    : "tiger bengal";

    fetch(
        `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=photo&per_page=50`
    )
    .then(r=>r.json())
    .then(d=>{

        const hit =
        d.hits[
            Math.floor(Math.random()*d.hits.length)
        ];

        img.src = hit.webformatURL;
    });
}

/* =========================
   次の画像
========================= */

function loadNextImage(){

    if(tigerMode){
        loadPixabayImage("tiger");
    }else{
        loadPixabayImage("shoebill");
    }

    tigerMode = !tigerMode;
}

/* =========================
   画像ロード
========================= */

img.onload = function(){

    adjust();

    init();

    shuffleBoard();
};

/* =========================
   サイズ調整
========================= */

function adjust(){

    const outer =
    document.getElementById("game-outer");

    const w = outer.clientWidth;
    const h = outer.clientHeight;

    const r = img.width / img.height;
    const ar = w / h;

    let fw, fh;

    if(r > ar){

        fw = w;
        fh = w / r;

    }else{

        fh = h;
        fw = h * r;
    }

    container.style.width = fw + "px";
    container.style.height = fh + "px";
}

/* =========================
   初期化
========================= */

function init(){

    container.innerHTML = "";

    tiles = [];

    for(let i=0;i<size*size;i++){

        const t = document.createElement("div");

        t.className = "tile";

        const x = i % size;
        const y = Math.floor(i / size);

        t.style.width =
        (100 / size) + "%";

        t.style.height =
        (100 / size) + "%";

        t.dataset.x = x;
        t.dataset.y = y;

        t.dataset.cx = x;
        t.dataset.cy = y;

        t.style.backgroundImage =
        `url('${img.src}')`;

        t.style.backgroundSize =
        `${size * 100}%`;

        t.style.backgroundPosition =
        `${(x/(size-1))*100}% ${(y/(size-1))*100}%`;

        t.addEventListener("touchstart",start);
        t.addEventListener("touchmove",move,{passive:false});
        t.addEventListener("touchend",end);

        container.appendChild(t);

        tiles.push(t);
    }

    render();
}

/* =========================
   描画
========================= */

function render(){

    tiles.forEach(t=>{

        t.style.transform =
        `translate(${t.dataset.x*(100/size)}%, ${t.dataset.y*(100/size)}%)`;
    });
}

/* =========================
   操作開始
========================= */

function start(e){

    drag = e.target;

    drag.style.zIndex = 10;
}

/* =========================
   ドラッグ
========================= */

function move(e){

    e.preventDefault();

    if(!drag)return;

    const touch = e.touches[0];

    const rect =
    container.getBoundingClientRect();

    const x =
    touch.clientX -
    rect.left -
    drag.offsetWidth / 2;

    const y =
    touch.clientY -
    rect.top -
    drag.offsetHeight / 2;

    drag.style.transition = "none";

    drag.style.transform =
    `translate(${x}px, ${y}px)`;
}

/* =========================
   終了
========================= */

function end(e){

    if(!drag)return;

    const touch = e.changedTouches[0];

    const rect =
    container.getBoundingClientRect();

    const x =
    Math.floor(
        (touch.clientX - rect.left)
        / (rect.width / size)
    );

    const y =
    Math.floor(
        (touch.clientY - rect.top)
        / (rect.height / size)
    );

    const target =
    tiles.find(t=>

        t.dataset.x == x &&
        t.dataset.y == y &&
        t !== drag
    );

    if(target){

        let tx = drag.dataset.x;
        let ty = drag.dataset.y;

        drag.dataset.x = target.dataset.x;
        drag.dataset.y = target.dataset.y;

        target.dataset.x = tx;
        target.dataset.y = ty;
    }

    drag.style.transform = "";
    drag.style.transition = "";

    render();

    drag.style.zIndex = 1;

    drag = null;

    check();
}

/* =========================
   クリア判定
========================= */

function check(){

    const ok =
    tiles.every(t=>

        t.dataset.x == t.dataset.cx &&
        t.dataset.y == t.dataset.cy
    );

    if(ok){

        overlay.style.display = "flex";

        setTimeout(()=>{

            overlay.style.display = "none";

            loadNextImage();

        },1500);
    }
}

/* =========================
   シャッフル
========================= */

function shuffleBoard(){

    let solved = true;

    while(solved){

        for(let i=0;i<size*size*3;i++){

            const a =
            tiles[Math.floor(Math.random()*tiles.length)];

            const b =
            tiles[Math.floor(Math.random()*tiles.length)];

            let tx = a.dataset.x;
            let ty = a.dataset.y;

            a.dataset.x = b.dataset.x;
            a.dataset.y = b.dataset.y;

            b.dataset.x = tx;
            b.dataset.y = ty;
        }

        solved =
        tiles.every(t=>

            t.dataset.x == t.dataset.cx &&
            t.dataset.y == t.dataset.cy
        );
    }

    render();
}

/* =========================
   難易度
========================= */

function changeDifficulty(s,btn){

    if(!img.src)return;

    size = s;

    document
    .querySelectorAll(".diff-btn")
    .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    init();

    shuffleBoard();
}

/* =========================
   手動画像
========================= */

function handleFile(input){

    const reader = new FileReader();

    reader.onload = e => {

        img.src = e.target.result;
    };

    reader.readAsDataURL(input.files[0]);
}

/* =========================
   開始
========================= */

loadNextImage();

</script>

</body>
</html>
