<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Poster Puzzle Pro</title>

<style>
body {
    margin:0;
    padding:0;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    background:#121212;
    color:white;
    height:100vh;
    overflow:hidden;
}

.header {
    width:100%;
    padding-top:calc(10px + env(safe-area-inset-top));
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1 {
    font-size:1.2rem;
    margin:5px 0;
    color:#ffeb3b;
}

.difficulty-selector {
    margin-bottom:8px;
    display:flex;
    gap:8px;
}

/* 少し大きく */
.diff-btn {
    padding:8px 16px;
    border-radius:18px;
    border:1px solid #555;
    background:#333;
    color:white;
    font-size:14px;
}

.diff-btn.active {
    border-color:#ffeb3b;
    color:#ffeb3b;
}

#game-outer {
    flex:1;
    width:95vw;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

#game-container {
    position:relative;
    border:3px solid #fff;
    border-radius:5px;
    background:#333;
    overflow:hidden;
}

.tile {
    position:absolute;
    border:1px solid rgba(255,255,255,0.2);
    box-sizing:border-box;
    transition:left 0.3s, top 0.3s;
    background-repeat:no-repeat;
}

.controls {
    width:95%;
    display:flex;
    justify-content:center;
    gap:8px;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
}

.btn {
    flex:1;
    padding:12px 0;
    border-radius:10px;
    border:none;
    font-weight:bold;
    color:white;
    font-size:13px;
}

.file-label { background:#e91e63; }
.shuffle-btn { background:#2196F3; }
.next-btn { background:#ff9800; }

input[type="file"] {
    display:none;
}

#clear-overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.congrats-text {
    font-size:2.5rem;
    font-weight:bold;
    color:#ffeb3b;
}
</style>
</head>

<body>

<div class="header">
    <h1>Poster Puzzle Pro</h1>

    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(3, this)">初級</button>
        <button class="diff-btn active" onclick="changeDifficulty(4, this)">中級</button>
        <button class="diff-btn" onclick="changeDifficulty(5, this)">上級</button>
        <button class="diff-btn" onclick="changeDifficulty(10, this)">超上級</button>
    </div>
</div>

<div id="game-outer">
    <div id="game-container"></div>
</div>

<div class="controls">
    <label class="btn file-label">
        <input type="file" accept="image/*" onchange="handleFile(this)">
        写真選択
    </label>

    <button class="btn shuffle-btn" onclick="shuffleBoard()">シャッフル</button>

    <button class="btn next-btn" onclick="loadNextImage()">次の画像</button>
</div>

<div id="clear-overlay">
    <div class="congrats-text">おめでとう！🎉</div>
</div>

<script>

/* =========================
   Pixabay APIキー
========================= */
const PIXABAY_KEY = "55756665-23bacf1941f5fd32e51bbc3c3";

/* =========================
   ゲーム状態
========================= */
let size = 4;
let img = new Image();
let tiles = [];
let isShuffled = false;

/* 交互切替 */
let tigerMode = false;

/* =========================
   DOM
========================= */
const container = document.getElementById("game-container");
const overlay = document.getElementById("clear-overlay");

/* =========================
   Pixabay画像取得
========================= */
function loadPixabayImage(type){

    const query = (type === "shoebill")
        ? "shoebill bird stork"
        : "tiger bengal tiger";

    fetch(
        `https://pixabay.com/api/?key=${PIXABAY_KEY}&q=${encodeURIComponent(query)}&image_type=photo&safesearch=true&per_page=50`
    )
    .then(res => res.json())
    .then(data => {

        if(!data.hits || data.hits.length === 0){
            console.log("画像なし");
            return;
        }

        const hit = data.hits[Math.floor(Math.random() * data.hits.length)];

        img.src = hit.webformatURL;
    })
    .catch(err => console.log(err));
}

/* =========================
   次の画像（交互）
========================= */
function loadNextImage(){

    if(tigerMode){
        loadPixabayImage("tiger");
    }else{
        loadPixabayImage("shoebill");
    }

    tigerMode = !tigerMode;
}

/* =========================
   手動画像
========================= */
function handleFile(input){

    if(input.files && input.files[0]){

        const reader = new FileReader();

        reader.onload = e => {
            img.src = e.target.result;
        };

        reader.readAsDataURL(input.files[0]);
    }
}

/* =========================
   画像ロード後
========================= */
img.onload = function(){

    adjustContainerSize();
    initBoard();

    // ★最初からシャッフル
    shuffleBoard();
};

/* =========================
   サイズ調整
========================= */
function adjustContainerSize(){

    const outer = document.getElementById("game-outer");

    const maxW = outer.clientWidth;
    const maxH = outer.clientHeight;

    const ratio = img.width / img.height;
    const area = maxW / maxH;

    let w,h;

    if(ratio > area){
        w = maxW;
        h = maxW / ratio;
    }else{
        h = maxH;
        w = maxH * ratio;
    }

    container.style.width = w + "px";
    container.style.height = h + "px";
}

/* =========================
   初期化
========================= */
function initBoard(){

    container.innerHTML = "";
    tiles = [];

    for(let i=0;i<size*size;i++){

        const tile = document.createElement("div");
        tile.className = "tile";

        const x = i % size;
        const y = Math.floor(i / size);

        tile.style.width = (100/size) + "%";
        tile.style.height = (100/size) + "%";

        tile.dataset.currentX = x;
        tile.dataset.currentY = y;

        tile.dataset.correctX = x;
        tile.dataset.correctY = y;

        tile.style.backgroundImage = `url('${img.src}')`;
        tile.style.backgroundSize = `${size*100}%`;
        tile.style.backgroundPosition =
            `${(x/(size-1))*100}% ${(y/(size-1))*100}%`;

        tile.addEventListener("touchstart", start, {passive:false});
        tile.addEventListener("touchmove", move, {passive:false});
        tile.addEventListener("touchend", end, {passive:false});

        container.appendChild(tile);
        tiles.push(tile);
    }

    updateAll();
}

/* =========================
   位置更新
========================= */
function updateAll(){
    tiles.forEach(t=>{
        t.style.left = (t.dataset.currentX*(100/size)) + "%";
        t.style.top = (t.dataset.currentY*(100/size)) + "%";
    });
}

/* =========================
   ドラッグ
========================= */
let drag=null;

function start(e){
    drag=e.target;
}

function move(e){
    e.preventDefault();
}

function end(){
    drag=null;
}

/* =========================
   シャッフル
========================= */
function shuffleBoard(){

    for(let i=0;i<size*size*3;i++){

        const a = tiles[Math.floor(Math.random()*tiles.length)];
        const b = tiles[Math.floor(Math.random()*tiles.length)];

        const ax = a.dataset.currentX;
        const ay = a.dataset.currentY;

        a.dataset.currentX = b.dataset.currentX;
        a.dataset.currentY = b.dataset.currentY;

        b.dataset.currentX = ax;
        b.dataset.currentY = ay;
    }

    isShuffled = true;
    updateAll();
}

/* =========================
   難易度
========================= */
function changeDifficulty(s,btn){

    size = s;

    document.querySelectorAll(".diff-btn")
        .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    initBoard();
    shuffleBoard();
}

/* =========================
   初期開始
========================= */
loadNextImage();

</script>
</body>
</html>
