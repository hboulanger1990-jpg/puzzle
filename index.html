<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>鳥パズル・難易度設定</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #121212; color: white; height: 100vh; overflow: hidden;
            touch-action: none;
        }
        h1 { font-size: 1.2rem; margin: 10px 0; color: #ffeb3b; }
        
        /* 難易度ボタンのスタイル */
        .difficulty-selector { margin-bottom: 15px; display: flex; gap: 10px; }
        .diff-btn { 
            padding: 8px 15px; border-radius: 20px; border: 2px solid #555;
            background: #333; color: white; font-size: 14px; cursor: pointer;
        }
        .diff-btn.active { border-color: #ffeb3b; background: #555; color: #ffeb3b; }

        #game-container { 
            position: relative; width: 90vw; height: 90vw; 
            max-width: 400px; max-height: 400px; 
            border: 4px solid #fff; border-radius: 10px; background: #333; 
        }
        .tile {
            position: absolute; background-image: url('https://loremflickr.com/600/600/bird');
            border: 1px solid rgba(255,255,255,0.2); box-sizing: border-box;
            transition: all 0.2s ease-out;
        }
        .controls { margin-top: 20px; }
        .shuffle-btn { 
            padding: 12px 40px; font-size: 18px; cursor: pointer; 
            background: #4caf50; color: white; border: none; border-radius: 50px; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <h1>Bird Puzzle</h1>
    
    <div class="difficulty-selector">
        <button class="diff-btn" onclick="changeDifficulty(3, this)">初級</button>
        <button class="diff-btn active" onclick="changeDifficulty(4, this)">中級</button>
        <button class="diff-btn" onclick="changeDifficulty(5, this)">上級</button>
    </div>

    <div id="game-container"></div>
    
    <div class="controls">
        <button class="shuffle-btn" onclick="shuffleBoard()">シャッフル</button>
    </div>

    <script>
        let size = 4; // デフォルトは4x4
        const container = document.getElementById('game-container');
        let tiles = [];
        let emptyPos = { x: 3, y: 3 };
        let touchStart = { x: 0, y: 0 };

        function initBoard() {
            container.innerHTML = '';
            tiles = [];
            const tileSize = 100 / size; // タイルの大きさを%で計算
            
            for (let i = 0; i < size * size - 1; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const x = i % size; const y = Math.floor(i / size);
                
                tile.style.width = tileSize + '%';
                tile.style.height = tileSize + '%';
                tile.style.left = (x * tileSize) + '%';
                tile.style.top = (y * tileSize) + '%';
                
                // 画像の分割位置を計算
                tile.style.backgroundSize = (size * 100) + '%';
                tile.style.backgroundPosition = `${(x / (size - 1)) * 100}% ${(y / (size - 1)) * 100}%`;
                
                tile.dataset.x = x; tile.dataset.y = y;
                container.appendChild(tile);
                tiles.push(tile);
            }
            emptyPos = { x: size - 1, y: size - 1 };
        }

        // 難易度変更関数
        function changeDifficulty(newSize, btnElement) {
            size = newSize;
            // ボタンの見た目を変える
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            initBoard();
        }

        // --- 以下、フリック操作と移動ロジック（基本は前回と同じですがsizeに対応） ---
        container.addEventListener('touchstart', (e) => {
            touchStart.x = e.touches[0].clientX;
            touchStart.y = e.touches[0].clientY;
        }, {passive: false});

        container.addEventListener('touchend', (e) => {
            const touchEnd = { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            const dx = touchEnd.x - touchStart.x;
            const dy = touchEnd.y - touchStart.y;
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

            let targetX = emptyPos.x; let targetY = emptyPos.y;
            if (Math.abs(dx) > Math.abs(dy)) {
                targetX = dx > 0 ? emptyPos.x - 1 : emptyPos.x + 1;
            } else {
                targetY = dy > 0 ? emptyPos.y - 1 : emptyPos.y + 1;
            }
            const tile = tiles.find(t => parseInt(t.dataset.x) === targetX && parseInt(t.dataset.y) === targetY);
            if (tile) moveTile(tile);
        }, {passive: false});

        function moveTile(tile) {
            const tx = parseInt(tile.dataset.x);
            const ty = parseInt(tile.dataset.y);
            const tempX = emptyPos.x; const tempY = emptyPos.y;
            emptyPos.x = tx; emptyPos.y = ty;
            tile.dataset.x = tempX; tile.dataset.y = tempY;
            const tileSize = 100 / size;
            tile.style.left = (tempX * tileSize) + '%';
            tile.style.top = (tempY * tileSize) + '%';
        }

        function shuffleBoard() {
            for (let i = 0; i < size * 50; i++) {
                const neighbors = tiles.filter(t => 
                    Math.abs(parseInt(t.dataset.x) - emptyPos.x) + Math.abs(parseInt(t.dataset.y) - emptyPos.y) === 1
                );
                moveTile(neighbors[Math.floor(Math.random() * neighbors.length)]);
            }
        }
        initBoard();
    </script>
</body>
</html>
