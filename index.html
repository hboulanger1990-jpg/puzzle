<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>縦長対応・マイフォトパズル</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background: #1a1a1a; color: white; min-height: 100vh;
        }
        h1 { font-size: 1.2rem; margin: 10px 0; }
        
        /* 縦長に合わせたコンテナ設定（幅300px：高さ400pxの比率） */
        #game-container { 
            position: relative; 
            width: 80vw; 
            height: 106.6vw; /* 3:4の比率 */
            max-width: 330px; 
            max-height: 440px; 
            border: 4px solid #fff; border-radius: 10px; 
            background: #333; overflow: hidden;
        }
        .tile {
            position: absolute;
            background-repeat: no-repeat;
            border: 0.5px solid rgba(255,255,255,0.3);
            box-sizing: border-box;
            transition: left 0.3s, top 0.3s;
        }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .btn-row { display: flex; gap: 10px; }
        input[type="file"] { display: none; }
        .custom-file-upload {
            padding: 10px 20px; background: #e91e63; border-radius: 50px; cursor: pointer; font-weight: bold;
        }
        .shuffle-btn { padding: 10px 30px; background: #2196F3; border: none; color: white; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Poster Puzzle</h1>
    
    <div class="controls">
        <label class="custom-file-upload">
            <input type="file" accept="image/*" onchange="loadImage(this)">
            📸 画像を選ぶ
        </label>
    </div>

    <div id="game-container"></div>
    
    <div class="controls">
        <div class="btn-row">
            <button class="shuffle-btn" onclick="shuffleBoard()">バラバラにする</button>
        </div>
    </div>

    <script>
        let size = 3; // 縦長なので3x4くらいがちょうどいい
        let rows = 4;
        let cols = 3;
        let currentImgUrl = "https://picsum.photos/300/400"; // 初期画像
        const container = document.getElementById('game-container');
        let tiles = [];
        let draggedTile = null;

        function loadImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImgUrl = e.target.result;
                    initBoard();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function initBoard() {
            container.innerHTML = '';
            tiles = [];
            const tileW = 100 / cols;
            const tileH = 100 / rows;
            
            for (let i = 0; i < cols * rows; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const x = i % cols; const y = Math.floor(i / cols);
                
                tile.style.width = tileW + '%';
                tile.style.height = tileH + '%';
                tile.dataset.currentX = x;
                tile.dataset.currentY = y;
                tile.dataset.correctX = x;
                tile.dataset.correctY = y;
                
                updateTilePosition(tile);
                tile.style.backgroundImage = `url('${currentImgUrl}')`;
                tile.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
                tile.style.backgroundPosition = `${(x / (cols - 1)) * 100}% ${(y / (rows - 1)) * 100}%`;

                tile.addEventListener('touchstart', handleTouchStart, {passive: false});
                tile.addEventListener('touchmove', handleTouchMove, {passive: false});
                tile.addEventListener('touchend', handleTouchEnd, {passive: false});

                container.appendChild(tile);
                tiles.push(tile);
            }
        }

        function updateTilePosition(tile) {
            tile.style.left = (tile.dataset.currentX * (100 / cols)) + '%';
            tile.style.top = (tile.dataset.currentY * (100 / rows)) + '%';
        }

        function handleTouchStart(e) {
            draggedTile = e.target;
            draggedTile.style.zIndex = 1000;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = container.getBoundingClientRect();
            draggedTile.style.left = (touch.clientX - rect.left - draggedTile.offsetWidth/2) + 'px';
            draggedTile.style.top = (touch.clientY - rect.top - draggedTile.offsetHeight/2) + 'px';
        }

        function handleTouchEnd(e) {
            const touch = e.changedTouches[0];
            const rect = container.getBoundingClientRect();
            const x = Math.floor((touch.clientX - rect.left) / (rect.width / cols));
            const y = Math.floor((touch.clientY - rect.top) / (rect.height / rows));

            const targetTile = tiles.find(t => t.dataset.currentX == x && t.dataset.currentY == y && t !== draggedTile);

            if (targetTile && x >= 0 && x < cols && y >= 0 && y < rows) {
                const tempX = draggedTile.dataset.currentX;
                const tempY = draggedTile.dataset.currentY;
                draggedTile.dataset.currentX = targetTile.dataset.currentX;
                draggedTile.dataset.currentY = targetTile.dataset.currentY;
                targetTile.dataset.currentX = tempX;
                targetTile.dataset.currentY = tempY;
            }

            tiles.forEach(updateTilePosition);
            draggedTile.style.zIndex = 1;
            draggedTile = null;
        }

        function shuffleBoard() {
            for (let i = 0; i < 30; i++) {
                const t1 = tiles[Math.floor(Math.random() * tiles.length)];
                const t2 = tiles[Math.floor(Math.random() * tiles.length)];
                const tx = t1.dataset.currentX; const ty = t1.dataset.currentY;
                t1.dataset.currentX = t2.dataset.currentX; t1.dataset.currentY = t2.dataset.currentY;
                t2.dataset.currentX = tx; t2.dataset.currentY = ty;
            }
            tiles.forEach(updateTilePosition);
        }

        initBoard();
    </script>
</body>
</html>
